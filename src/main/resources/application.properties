spring.application.name=url-shortener

server.port=8080

# Actuator: expose health for load balancers (ECS / ALB)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.urlshortener.redirect.latency=true
management.metrics.distribution.percentiles-histogram.urlshortener.create.latency=true
management.metrics.distribution.percentiles-histogram.urlshortener.analytics.latency=true

# Redis (ElastiCache or local)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s

# URL shortener service
url-shortener.aws.region=us-east-1
# Optional: override for LocalStack or DynamoDB Local (http://localhost:8000)
url-shortener.dynamodb.endpoint=
url-shortener.dynamodb.table-name=url-shortener-mappings

url-shortener.cache.key-prefix=url:
url-shortener.cache.ttl=PT1H
url-shortener.cache.negative-ttl=PT1M

url-shortener.urls.max-length=2048
url-shortener.urls.default-ttl-days=30
url-shortener.urls.max-ttl-days=365

# Comma-separated hosts (no scheme); matched case-insensitively against URL host
url-shortener.policy.blocked-domains=

# Per-IP token bucket (approximate). Refill fully each window.
url-shortener.rate-limit.create-capacity=120
url-shortener.rate-limit.create-refill-minutes=1
url-shortener.rate-limit.redirect-capacity=6000
url-shortener.rate-limit.redirect-refill-minutes=1

# Health: disable DynamoDB table describe locally if needed (tests default off via profile)
url-shortener.health.dynamodb-enabled=true

# Code generation
url-shortener.code.random-retries-max=12
